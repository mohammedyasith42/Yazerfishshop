<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Yazer Fish Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="progress-bar"></div>
    <nav class="navbar navbar-expand-lg fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-fish"></i> Yazer Fish Shop</a>
        </div>
    </nav>
    
    <section class="section" style="padding-top: 150px; min-height:100vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5" data-aos="fade-up">
                    <div class="glass-card p-5">
                        <h3 class="text-center mb-4">Register</h3>
                        <form>
                            <div class="mb-3"><label>Name</label><input type="text" class="form-control" placeholder="Enter your name"></div>
                            <div class="mb-3"><label>Email</label><input type="email" class="form-control" placeholder="Enter your email"></div>
                            <div class="mb-3"><label>Phone</label><input type="tel" class="form-control" placeholder="Enter your phone"></div>
                            <div class="mb-3"><label>Password</label><input type="password" class="form-control" placeholder="Create a password"></div>
                            <button class="btn btn-primary w-100 mb-3">Register</button>
                            <p class="text-center">Already have an account? <a href="login.html">Login</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
