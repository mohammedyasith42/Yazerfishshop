<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Yazer Fish Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="progress-bar"></div>
    <nav class="navbar navbar-expand-lg fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-fish"></i> Yazer Fish Shop</a>
        </div>
    </nav>
    
    <section class="section" style="padding-top:150px;">
        <div class="container">
            <h2 class="mb-5" data-aos="fade-up">Checkout</h2>
            <div class="row g-5">
                <div class="col-lg-8" data-aos="fade-right">
                    <div class="glass-card p-4 mb-4">
                        <h4>Billing Address</h4>
                        <div class="row g-3">
                            <div class="col-md-6"><input type="text" class="form-control" placeholder="First Name"></div>
                            <div class="col-md-6"><input type="text" class="form-control" placeholder="Last Name"></div>
                            <div class="col-12"><input type="email" class="form-control" placeholder="Email"></div>
                            <div class="col-12"><input type="tel" class="form-control" placeholder="Phone"></div>
                            <div class="col-12"><input type="text" class="form-control" placeholder="Address"></div>
                            <div class="col-md-6"><input type="text" class="form-control" placeholder="City"></div>
                            <div class="col-md-6"><input type="text" class="form-control" placeholder="Pincode"></div>
                        </div>
                    </div>
                    <div class="glass-card p-4 mb-4">
                        <h4>Payment Method</h4>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="payment" id="cod" checked><label class="form-check-label" for="cod">Cash on Delivery</label></div>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="payment" id="upi"><label class="form-check-label" for="upi">UPI</label></div>
                        <div class="form-check mb-2"><input class="form-check-input" type="radio" name="payment" id="card"><label class="form-check-label" for="card">Credit/Debit Card</label></div>
                    </div>
                </div>
                <div class="col-lg-4" data-aos="fade-left">
                    <div class="glass-card p-4">
                        <h4>Order Summary</h4>
                        <hr>
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span><strong id="checkout-subtotal">₹0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>GST:</span><strong id="checkout-gst">₹0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>Delivery:</span><strong>Free</strong></div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4"><h5>Total:</h5><h5 id="checkout-total">₹0</h5></div>
                        <button class="btn btn-primary w-100" onclick="showToast('Order placed successfully!')">Place Order</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <footer class="footer-section">
        <div class="container"><div class="text-center pb-4"><h3><i class="fas fa-fish"></i> Yazer Fish Shop</h3><p>&copy; 2026 Yazer Fish Shop. All Rights Reserved.</p></div></div>
    </footer>
    
    <div id="notification-toast" class="notification-toast"><div class="toast-content"><i class="bi bi-check-circle-fill"></i><span id="toast-message">Order placed!</span></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const gst = Math.round(subtotal * 0.05);
            const total = subtotal + gst;
            
            document.getElementById('checkout-subtotal').textContent = `₹${subtotal}`;
            document.getElementById('checkout-gst').textContent = `₹${gst}`;
            document.getElementById('checkout-total').textContent = `₹${total}`;
        });
    </script>
</body>
</html>
