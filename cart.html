<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Yazer Fish Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animation.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="progress-bar"></div>
    <div class="floating-buttons">
        <a href="https://wa.me/911234567890" class="floating-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
        <a href="tel:+911234567890" class="floating-btn call"><i class="fas fa-phone-alt"></i></a>
    </div>
    <button id="back-to-top" class="btn btn-primary rounded-circle"><i class="bi bi-arrow-up"></i></button>
    
    <nav class="navbar navbar-expand-lg fixed-top navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-fish"></i> Yazer Fish Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mx-auto"><li class="nav-item"><a class="nav-link" href="index.html">Home</a></li><li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li><li class="nav-item"><a class="nav-link" href="index.html#categories">Categories</a></li><li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li><li class="nav-item"><a class="nav-link" href="index.html#testimonials">Testimonials</a></li><li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li></ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-light position-relative" id="cart-toggle"><i class="bi bi-cart3"></i><span class="badge bg-danger position-absolute top-0 start-100 translate-middle rounded-pill">0</span></button>
                    <a href="login.html" class="btn btn-primary"><i class="bi bi-person-circle"></i> Login</a>
                </div>
            </div>
        </div>
    </nav>
    
    <section class="section" style="padding-top: 150px;">
        <div class="container">
            <h2 class="mb-5" data-aos="fade-up">Your Cart</h2>
            <div class="row g-4">
                <div class="col-lg-8" id="cart-page-items" data-aos="fade-right">
                </div>
                <div class="col-lg-4" data-aos="fade-left">
                    <div class="glass-card p-4">
                        <h4>Order Summary</h4>
                        <hr>
                        <div class="d-flex justify-content-between mb-2"><span>Subtotal:</span><strong id="page-subtotal">₹0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>GST (5%):</span><strong id="page-gst">₹0</strong></div>
                        <div class="d-flex justify-content-between mb-2"><span>Delivery:</span><strong>Free</strong></div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4"><h5>Total:</h5><h5 id="page-total">₹0</h5></div>
                        <a href="checkout.html" class="btn btn-primary w-100">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <footer class="footer-section">
        <div class="container"><div class="text-center pb-4"><h3><i class="fas fa-fish"></i> Yazer Fish Shop</h3><p>&copy; 2026 Yazer Fish Shop. All Rights Reserved.</p></div></div>
    </footer>
    
    <div id="notification-toast" class="notification-toast"><div class="toast-content"><i class="bi bi-check-circle-fill"></i><span id="toast-message">Item added!</span></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartPageUI();
        });
        
        function updateCartPageUI() {
            const container = document.getElementById('cart-page-items');
            if (cart.length === 0) {
                container.innerHTML = '<div class="text-center p-5 glass-card"><h4>Your cart is empty</h4><a href="shop.html" class="btn btn-primary mt-3">Shop Now</a></div>';
            } else {
                container.innerHTML = cart.map(item => `
                    <div class="glass-card p-4 mb-3 d-flex gap-4">
                        <div style="width:100px;height:100px;background:linear-gradient(135deg,#e6f7ff,#f0f9ff);border-radius:15px;"></div>
                        <div class="flex-grow-1">
                            <h5>${item.name}</h5>
                            <p class="text-muted">₹${item.price} / ${item.weight}</p>
                            <div class="d-flex align-items-center gap-3">
                                <div class="d-flex align-items-center border rounded">
                                    <button class="btn btn-sm px-3" onclick="updateQuantity('${item.id}', -1)">-</button>
                                    <span class="px-3">${item.quantity}</span>
                                    <button class="btn btn-sm px-3" onclick="updateQuantity('${item.id}', 1)">+</button>
                                </div>
                                <button class="btn btn-sm text-danger" onclick="removeFromCart('${item.id}')"><i class="bi bi-trash"></i> Remove</button>
                            </div>
                        </div>
                        <div class="text-end"><h5>₹${item.price * item.quantity}</h5></div>
                    </div>
                `).join('');
                
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const gst = Math.round(subtotal * 0.05);
                const total = subtotal + gst;
                
                document.getElementById('page-subtotal').textContent = `₹${subtotal}`;
                document.getElementById('page-gst').textContent = `₹${gst}`;
                document.getElementById('page-total').textContent = `₹${total}`;
            }
        }
        
        const originalUpdateCartUI = updateCartUI;
        updateCartUI = function() {
            originalUpdateCartUI();
            updateCartPageUI();
        };
    </script>
</body>
</html>
